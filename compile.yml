name: Compile GhostLab MD
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup SGDK
        run: |
          git clone https://github.com/Stephane-D/SGDK.git ../sgdk
          echo "SGDK_PATH=$GITHUB_WORKSPACE/../sgdk" >> $GITHUB_ENV

      - name: Build ROM
        run: |
          # Aquí es donde ocurre la magia de 16 bits
          make -f ../sgdk/makefile.gen GCC=m68k-elf-gcc
          
name: Build Genesis ROM
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install SGDK Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-m68k-linux-gnu make
          git clone https://github.com/Stephane-D/SGDK.git ../sgdk

      - name: Compile GhostLab_MD
        run: |
          # Usamos el makefile de SGDK para unir tu musica XGM y tus sprites
          make -f ../sgdk/makefile.gen GCC=m68k-linux-gnu-gcc
          
      - name: Upload ROM
        uses: actions/upload-artifact@v3
        with:
          name: Genesis-ROM
          path: out/rom.bin
          
name: Build Genesis ROM
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install SGDK Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-m68k-linux-gnu make
          git clone https://github.com/Stephane-D/SGDK.git ../sgdk

      - name: Compile GhostLab_MD
        run: |
          # Esto une tus sprites de 6x6 y tu música XGM
          make -f ../sgdk/makefile.gen GCC=m68k-linux-gnu-gcc
          
      - name: Upload ROM
        uses: actions/upload-artifact@v3
        with:
          name: GhostLab-ROM
          path: out/rom.bin
          
